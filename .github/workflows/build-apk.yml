name: Build Android APK

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p android-project/app/src/main/java/com/tizenbrew/iptv
          mkdir -p android-project/app/src/main/assets
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi

      - name: Create build.gradle (project)
        run: |
          cat > android-project/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > android-project/settings.gradle << 'EOF'
          include ':app'
          EOF

      - name: Create gradle.properties
        run: |
          cat > android-project/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Set version from run number
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.1.${{ github.run_number }}" >> $GITHUB_ENV
          echo "TAG_NAME=v1.1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create app/build.gradle
        run: |
          cat > android-project/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.tizenbrew.iptv'
              compileSdk 34

              defaultConfig {
                  applicationId "com.tizenbrew.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode ${{ env.VERSION_CODE }}
                  versionName "${{ env.VERSION_NAME }}"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
              implementation 'androidx.media3:media3-exoplayer:1.1.1'
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > android-project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="IPTV Player"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > android-project/app/src/main/java/com/tizenbrew/iptv/MainActivity.java << 'JAVAEOF'
          package com.tizenbrew.iptv;

          import android.app.Activity;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.view.ViewGroup;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.FrameLayout;
          import android.widget.TextureView;

          import androidx.annotation.NonNull;
          import androidx.media3.common.MediaItem;
          import androidx.media3.common.PlaybackException;
          import androidx.media3.common.Player;
          import androidx.media3.common.util.UnstableApi;
          import androidx.media3.exoplayer.ExoPlayer;

          @UnstableApi
          public class MainActivity extends Activity {
              private WebView webView;
              private ExoPlayer player;
              private TextureView textureView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  FrameLayout root = new FrameLayout(this);

                  textureView = new TextureView(this);
                  root.addView(textureView, new FrameLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT));

                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.TRANSPARENT);
                  root.addView(webView, new FrameLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT));

                  setContentView(root);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.addJavascriptInterface(new PlayerBridge(), "NativePlayer");
                  webView.loadUrl("file:///android_asset/index.html");
                  hideSystemUI();
              }

              private void startPlayback(String url) {
                  releasePlayer();
                  player = new ExoPlayer.Builder(this).build();
                  player.setVideoTextureView(textureView);
                  textureView.setVisibility(View.VISIBLE);
                  player.addListener(new Player.Listener() {
                      @Override public void onPlaybackStateChanged(int state) {
                          if (state == Player.STATE_READY)
                              js("window._onNativeReady && window._onNativeReady()");
                          else if (state == Player.STATE_ENDED)
                              js("window._onNativeEnded && window._onNativeEnded()");
                      }
                      @Override public void onPlayerError(@NonNull PlaybackException e) {
                          js("window._onNativeError && window._onNativeError('" + esc(e.getMessage()) + "')");
                      }
                  });
                  player.setMediaItem(MediaItem.fromUri(Uri.parse(url)));
                  player.prepare();
                  player.play();
              }

              private void releasePlayer() {
                  if (player != null) { player.release(); player = null; }
                  textureView.setVisibility(View.GONE);
              }

              private void js(String code) {
                  webView.evaluateJavascript(code, null);
              }

              private static String esc(String s) {
                  return s == null ? "unknown" : s.replace("\\", "\\\\").replace("'", "\\'").replace("\n", " ");
              }

              public class PlayerBridge {
                  @JavascriptInterface public void play(String url) { runOnUiThread(() -> startPlayback(url)); }
                  @JavascriptInterface public void pause() { runOnUiThread(() -> { if (player != null) player.pause(); }); }
                  @JavascriptInterface public void resume() { runOnUiThread(() -> { if (player != null) player.play(); }); }
                  @JavascriptInterface public void stop() { runOnUiThread(() -> releasePlayer()); }
                  @JavascriptInterface public boolean isPlaying() { return player != null && player.isPlaying(); }
                  @JavascriptInterface public void seek(long ms) { runOnUiThread(() -> {
                      if (player != null) player.seekTo(Math.max(0, player.getCurrentPosition() + ms));
                  }); }
                  @JavascriptInterface public long getPosition() { return player != null ? player.getCurrentPosition() : 0; }
                  @JavascriptInterface public long getDuration() { return player != null ? player.getDuration() : -1; }
                  @JavascriptInterface public void setVolume(float delta) { runOnUiThread(() -> {
                      if (player != null) player.setVolume(Math.max(0f, Math.min(1f, player.getVolume() + delta)));
                  }); }
                  @JavascriptInterface public void setSpeed(float speed) { runOnUiThread(() -> {
                      if (player != null) player.setPlaybackSpeed(speed);
                  }); }
              }

              private void hideSystemUI() {
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                                  | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                                  | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_FULLSCREEN);
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) { hideSystemUI(); }
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) { webView.goBack(); } else { super.onBackPressed(); }
              }

              @Override
              protected void onDestroy() {
                  releasePlayer();
                  super.onDestroy();
              }
          }
          JAVAEOF

      - name: Copy web assets
        run: |
          cp -r android/* android-project/app/src/main/assets/

      - name: Generate launcher icon
        run: |
          cat > android-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#1a1a1a</color>
          </resources>
          EOF

          cat > android-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

      - name: Generate simple icon using ImageMagick
        run: |
          sudo apt-get install -y imagemagick
          convert -size 48x48 xc:'#1a1a1a' -fill '#ffd600' -gravity center -pointsize 24 -annotate 0 'TV' android-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:'#1a1a1a' -fill '#ffd600' -gravity center -pointsize 36 -annotate 0 'TV' android-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:'#1a1a1a' -fill '#ffd600' -gravity center -pointsize 48 -annotate 0 'TV' android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:'#1a1a1a' -fill '#ffd600' -gravity center -pointsize 72 -annotate 0 'TV' android-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Make gradlew executable
        run: |
          cd android-project
          gradle wrapper --gradle-version 8.4

      - name: Build APK
        run: |
          cd android-project
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android-project/app/build/outputs/apk/debug/app-debug.apk iptv-player.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player
          path: iptv-player.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: IPTV Player ${{ env.VERSION_NAME }}
          body: |
            ## IPTV Player for Android TV v${{ env.VERSION_NAME }}

            ### Install
            1. Download `iptv-player.apk` below
            2. Transfer to your Android TV (USB, AirSend, etc.)
            3. Install the APK (enable "Unknown sources" if needed)
            4. Open IPTV Player and scan QR code with your phone

            ### Features
            - QR code setup (no remote typing)
            - Channel groups
            - D-Pad remote controls
            - Fullscreen mode
          files: iptv-player.apk
          make_latest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
